services:
  hoton-graphtr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      # Host side configurable via RAG_PORT; container side stays 8030 to match
      # the Dockerfile's hardcoded `uvicorn --port 8030` CMD.
      - "${RAG_PORT:-8030}:8030"
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env — no weak default}
      USAGE_DB_HOST: postgres
      USAGE_DB_PORT: 5432
      USAGE_DB_USER: lmr
      USAGE_DB_PASSWORD: ${USAGE_DB_PASSWORD:?set USAGE_DB_PASSWORD in .env — no weak default}
      USAGE_DB_NAME: hoton_rag
      DASHBOARD_USER: ${DASHBOARD_USER:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      CODE_REPOS_DIR: /data/code-repos
      RAG_PORT: 8030
      EMBED_MODEL_NAME: ${RAG_EMBED_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      EMBED_DIM: ${RAG_EMBED_DIM:-384}
      REASONING_MODEL_NAME: ${RAG_REASONING_MODEL_NAME:-Qwen/Qwen2.5-1.5B-Instruct}
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ${MODELS_DIR:-./models}/huggingface:/root/.cache/huggingface
      - ${CODE_REPOS_DIR_HOST:-./code-repos}:/data/code-repos
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env — no weak default}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lmr
      POSTGRES_PASSWORD: ${USAGE_DB_PASSWORD:?set USAGE_DB_PASSWORD in .env — no weak default}
      POSTGRES_DB: hoton_rag
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:
