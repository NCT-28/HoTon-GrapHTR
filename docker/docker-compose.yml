services:
  hoton-graphtr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8030:8030"
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      USAGE_DB_HOST: postgres
      USAGE_DB_PORT: 5432
      USAGE_DB_USER: lmr
      USAGE_DB_PASSWORD: changeme
      USAGE_DB_NAME: hoton_rag
      RAG_PORT: 8030
    volumes:
      - ../repos:/app/repos
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lmr
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: hoton_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:
